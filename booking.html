<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service - StitchDoor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">StitchDoor</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#pricing">Pricing</a></li>
            </ul>
        </nav>
    </header>

    <section class="booking-section">
        <div class="booking-container">
            <h1>Book Your Service</h1>
            <form id="bookingForm" class="booking-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="service">Service Type</label>
                    <select id="service" name="service" required>
                        <option value="">Select a service</option>
                        <option value="alterations">Alterations</option>
                        <option value="custom">Custom Stitching</option>
                        <option value="repairs">Repairs</option>
                        <option value="embroidery">Embroidery</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Preferred Date</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group">
                    <label for="time">Preferred Time</label>
                    <select id="time" name="time" required>
                        <option value="">Select time</option>
                        <option value="9-11">9:00 AM - 11:00 AM</option>
                        <option value="11-1">11:00 AM - 1:00 PM</option>
                        <option value="2-4">2:00 PM - 4:00 PM</option>
                        <option value="4-6">4:00 PM - 6:00 PM</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="details">Additional Details</label>
                    <textarea id="details" name="details" rows="4" placeholder="Describe what you need..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Book Appointment</button>
            </form>

            <div id="confirmationMessage" class="confirmation-message" style="display: none;">
                <h2>Booking Confirmed!</h2>
                <p>Thank you for booking with StitchDoor. We'll contact you shortly to confirm your appointment.</p>
                <a href="index.html" class="btn-primary">Back to Home</a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 StitchDoor. All rights reserved.</p>
        <p style="margin-top: 0.5rem;"><a href="admin.html" style="color: #6366f1; text-decoration: none;">Admin Panel</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
